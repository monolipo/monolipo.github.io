  - title: Optimized cutting off transit algorithm to study stellar rotation from PLATO mission light curves
    link: https://ui.adsabs.harvard.edu/abs/2020ExA....50...73D
    authors: de Almeida, L.; Anthony, F.; Mattiuci, A. C.; Castro, M.; da Costa, J. S.; Samadi, R.; do Nascimento, J.-D.
    more: ''
    journal: Experimental Astronomy
    volume: '50'
    page: 1-0
    year: 2020
    show-home: true
    first-author: true
    refereed: true
    rank: 1
    ads: https://ui.adsabs.harvard.edu/abs/2020ExA....50...73D
    bibcode: 2020ExA....50...73D
    doi: https://doi.org/10.1007/s10686-020-09664-x
    arxiv: https://arxiv.org/abs/2005.07756
    abstract: Measuring the stellar rotation of one of the components in eclipsing binaries (EBs) or planetary systems is
      a challenge task. The difficulty is mainly due to the complexity of analyzing, in the same light curve, the signal from
      the stellar rotation mixed with the transit signal of a stellar or substellar companion, like a brown dwarf or planet.
      There are many methods to correct the long-term trend of the light curve. However, the correction often erases the signal
      of the stellar rotation from spots crossing the visible stellar disk and other weaker signals like planets. In this
      work, we present the DiffeRencial flUx Method of cuTting Off biNariES (DRUM TONES) to identify the signal of the binary
      transits and disentangle it from stellar rotation planet signals. We present our technique with applications to EBs
      from CoRoT, Kepler, Kepler K2 and TESS missions. We also applied our method to simulated synthetic EB from the PLATO
      mission. Our method shows good agreement in the determination of stellar rotation periods for few observed targets from
      last space missions, as well it is naturally useful for future European mission, such as PLAnetary Transits and Oscillations
      of stars (PLATO).
    keywords: Eclipsing binaries, Data analysis, Stellar rotation, Astrophysics - Solar and Stellar Astrophysics
    full-authors: de Almeida, Leandro; Anthony, Francys; Carolina Mattiuci, Ana; Castro, Matthieu; Soares da Costa, Jefferson;
      Samadi, Réza; do Nascimento, José Dias
