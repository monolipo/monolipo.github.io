    arxiv: https://arxiv.org/abs/2503.15422
    abstract: 'Neutron star-black hole (NSBH) mergers, detectable via their gravitational-wave (GW) emission, are expected
      to produce kilonovae (KNe). Four NSBH candidates have been identified and followed-up by more than fifty instruments
      since the start of the fourth GW observing run (O4), in May 2023, up to July 2024; however, no confirmed associated
      KN has been detected. This study evaluates ejecta properties from multimessenger observations to understand the absence
      of detectable KN: we use GW public information and joint observations taken from 05.2023 to 07.2024 (LVK, ATLAS, DECam,
      GECKO, GOTO, GRANDMA, SAGUARO, TESS, WINTER, ZTF). First, our analysis on follow-up observation strategies shows that,
      on average, more than 50% of the simulated KNe associated with NSBH mergers reach their peak luminosity around one day
      after merger in the g, r, i- bands, which is not necessarily covered for each NSBH GW candidate. We also analyze the
      trade-off between observation efficiency and the intrinsic properties of the KN emission, to understand the impact on
      how these constraints affect our ability to detect the KN, and underlying ejecta properties for each GW candidate. In
      particular, we can only confirm the kilonova was not missed for 1% of the GW230529 and S230627c sky localization region,
      given the large sky localization error of GW230529 and the large distance for S230627c and, their respective KN faint
      luminosities. More constraining, for S230518h, we infer the dynamical ejecta and postmerger disk wind ejecta mdyn,mwind0.03M☉
      and the viewing angle >25°. Similarly, the nonastrophysical origin of S240422ed is likely further confirmed by the fact
      that we would have detected even a faint KN at the time and presumed distance of the S240422ed event candidate, within
      a minimum 45% credible region of the sky area, that can be larger depending on the KN scenario.'
