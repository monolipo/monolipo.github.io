  - title: 'Orbital Period Variation of KIC 10544976: Applegate Mechanism versus Light Travel Time Effect'
    link: https://ui.adsabs.harvard.edu/abs/2019AJ....157..150A
    authors: Almeida, L. A.; de Almeida, L.; Damineli, A.; Rodrigues, C. V.; Castro, M.; Lopes, C. E. Ferreira; Jablonski,
      F.; do Nascimento, J.-D.; Pereira, M. G.
    more: ''
    journal: AJ
    volume: '157'
    page: '150'
    year: 2019
    show-home: true
    first-author: false
    refereed: true
    rank: 2
    ads: https://ui.adsabs.harvard.edu/abs/2019AJ....157..150A
    bibcode: 2019AJ....157..150A
    doi: https://doi.org/10.3847/1538-3881/ab0963
    arxiv: https://arxiv.org/abs/1903.09637
    abstract: 'In recent years, several close post-common-envelope eclipsing binaries have been found to show cyclic eclipse
      timing variations (ETVs). This effect is usually interpreted either as the gravitational interaction among circumbinary
      bodies and the host binary—known as the light travel time (LTT) effect—or as the quadrupole moment variations in one
      magnetic active component—known as the Applegate mechanism. In this study, we present an analysis of the ETV and the
      magnetic cycle of the close binary KIC 10544976. This system is composed of a white dwarf and a red dwarf in a short
      orbital period (0.35 days) and was monitored by ground-based telescopes between 2005 and 2017 and by the Kepler satellite
      between 2009 and 2013. Using the Kepler data, we derived the magnetic cycle of the red dwarf by two ways: the rate and
      energy of flares and the variability due to spots. Both methods resulted in a cycle of 600 days, which is in agreement
      with magnetic cycles measured for single low-mass stars. The orbital period of KIC 10544976 shows only one long-term
      variation which can be fitted by an LTT effect with period of 16.8 yr. Hence, one possible explanation for the ETVs
      is the presence of a circumbinary body with a minimal mass of 13.4 M $_Jup$. In the particular scenario of coplanarity
      between the external body and the inner binary, the third body mass is also 13.4 M $_Jup$. In this case, the circumbinary
      planet must either have survived the evolution of the host binary or have been formed as a consequence of its evolution.'
    keywords: 'binaries: eclipsing, planetary systems, stars: activity, stars: flare, stars: individual: KIC 10544976, starspots,
      Astrophysics - Solar and Stellar Astrophysics'
    full-authors: Almeida, L. A.; de Almeida, L.; Damineli, A.; Rodrigues, C. V.; Castro, M.; Ferreira Lopes, C. E.; Jablonski,
      F.; do Nascimento, Jr., J.-D.; Pereira, M. G.
