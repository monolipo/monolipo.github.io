      A. S.
    category: coauthor
  - title: 'TOI-1736 and TOI-2141: Two systems including sub-Neptunes around solar analogs revealed by TESS and SOPHIE'
    link: https://ui.adsabs.harvard.edu/abs/2023A&A...680A..84M
    authors: Martioli, E.; Hébrard, G.; de Almeida, L.; Heidari, N.; Lorenzo-Oliveira, D.; Kiefer, F.
    more: ''
    journal: A&A
    volume: '680'
    page: A84
