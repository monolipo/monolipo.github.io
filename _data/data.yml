  - title: 'HD43587: a primary CoRoT target under a Maunder minimum phase?'
    link: https://ui.adsabs.harvard.edu/abs/2020A&A...640A..46F
    authors: Ferreira, R. R.; Barbosa, R.; Castro, M.; Guerrero, G.; de Almeida, L.; Boumier, P.; do Nascimento, J.-D.
