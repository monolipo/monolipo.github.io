publications:
  title: Publications
  title_ptbr: Publicações
  home-title: Selected Publications
  home-title_ptbr: Publicações Selecionadas
  intro: Selected and complete publication list compiled from my Lattes CV and ADS records. Use **+** after *et al.* to expand
    the author list, and **+info** to display abstracts and extra links when available.
  intro_ptbr: Lista completa e selecionada de publicações compilada a partir do meu currículo Lattes e dos registros do ADS.
    Use **+** após *et al.* para expandir a lista de autores, e **+info** para exibir resumos e links extras quando disponíveis.
  papers:
  - title: ExoClock Project. IV. A Homogeneous Catalog of 620 Updated Exoplanet Ephemerides
    link: https://ui.adsabs.harvard.edu/abs/2026ApJS..283....5K
    authors: Kokori, A.; Tsiaras, A.; Pantelidou, G.; Jones, A.; Siakas, A.; Edwards, B.; Tinetti, G.; Wünsche, A.; Jongen,
      Y.; Libotte, F.; Corrêa, M.; Mugnai, L. V.; Bocchieri, A.; Capildeo, A. R.; Poultourtzidis, E.; Sidiropoulos, C.; Bewersdorff,
      L.; Lekkas, G.; Grivas, G.; Almeida, L.; et al.
    more: ''
    journal: ApJS
    volume: '283'
    page: '5'
    year: 2026
    show-home: true
    first-author: false
    refereed: true
    rank: 2
    ads: https://ui.adsabs.harvard.edu/abs/2026ApJS..283....5K
    bibcode: 2026ApJS..283....5K
    doi: https://doi.org/10.3847/1538-4365/ae3238
    arxiv: https://arxiv.org/abs/2511.14407
    abstract: The ExoClock project is an open platform aiming to monitor exoplanets by integrating observations from space-
      and ground-based telescopes. This study presents an updated catalog of 620 exoplanet ephemerides, integrating 30,000
      measurements from ground-based telescopes (the ExoClock network), literature, and space telescopes (Kepler, K2 and TESS).
      The updated catalog includes 277 planets from TESS which require special observing strategies due to their shallow transits
      or bright host stars. This study demonstrates that data from larger telescopes, and the employment of new methodologies
      such as synchronous observations with small telescopes, are capable of monitoring special cases of planets. The new
      ephemerides show that 45% of the planets required an update while the results show an improvement of 1 order of magnitude
      in prediction uncertainty. The collective analysis also enabled the identification of new planets showing transit-timing
      variations, highlighting the importance of extensive observing coverage. Developed in the context of the ESA's Ariel
      space mission, with the goal of delivering a catalog with reliable ephemerides to increase the mission efficiency, ExoClock's
      scope and service have grown well beyond the remit of Ariel. The ExoClock project has been operating in the framework
      of open science, and all tools and products are accessible to everyone within academia and beyond, to support efficient
      scheduling of future exoplanet observations, especially from larger telescopes where the pressure for time allocation
      efficiency is higher (Ariel, JWST, VLT, ELT, Subaru etc.). The inclusion of diverse audiences in the process and the
      collaborative mode not only foster democratization of science but also enhance the quality of the results.
