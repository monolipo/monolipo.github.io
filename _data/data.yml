    refereed: true
    rank: 2
    ads: https://ui.adsabs.harvard.edu/abs/2025ApJ...992..174V
    bibcode: 2025ApJ...992..174V
    doi: https://doi.org/10.3847/1538-4357/adf8e2
    arxiv: https://arxiv.org/abs/2510.08424
    abstract: 'Measuring starspot temperatures is crucial for understanding stellar magnetic activity as it affects stellar
      brightness variations, influences exoplanet transit measurements, and provides constraints on the physical conditions
      and energy transport in active regions, offering insights into stellar dynamos. Our goal is to determine the temperature
      of starspots on the active star CoRoT-2 to enhance our understanding of magnetic activity in young, solar-like stars.
      Multiwavelength observations were conducted using the Simultaneous Polarimeter and Rapid Camera in Four bands instrument
      on the 1.6 m telescope at Pico dos Dias Observatory (Brazil), capturing simultaneous transit data in four photometric
      bands (g, r, i, and z). The ECLIPSE model, combined with Markov Chain Monte Carlo fitting, was used to model spot characteristics
      during the planetary transit of CoRoT-2 b. The spot intensities were analyzed considering three different methods: the
      assumption of blackbody emission, the PHOENIX atmospheric model, and multiwavelength fitting assuming the same spot
      parameters for all wavelengths. Two starspots were detected in the residuals of the light curve, yielding temperature
      estimates of 5040─5280 K based on the three different methods. These values align more closely with the temperatures
      of solar penumbrae than with typical umbral temperatures, suggesting relatively moderate magnetic activity. The radius
      of the spots ranged from 0.34 to 0.61 the planetary radius, or equivalently (38─69) × 10$^6$ m, much larger than sunspots.
      This study provides a method to estimate spot temperatures on active stars using multiband photometry, with results
      indicating penumbral-like temperatures on CoRoT-2. The methodology enhances precision in starspot temperature estimation,
      beneficial for studies of stellar activity and exoplanet characterization.'
