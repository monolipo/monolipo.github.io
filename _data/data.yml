  - title: 'HIP 8522: A Puzzling Young Solar Twin with the Lowest Detected Lithium Abundance'
    link: https://ui.adsabs.harvard.edu/abs/2025ApJ...983...70Y
    authors: Galarza, J. Y.; Lorenzo-Oliveira, D.; Ferreira, T.; Reggiani, H.; Behmard, A.; Simon, J. D.; Martioli, E.; López-Valdivia,
      R.; de Almeida, L.; Jofré, E.; El-Badry, K.
    more: ''
    journal: ApJ
