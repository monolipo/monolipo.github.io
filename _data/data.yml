    arxiv: https://arxiv.org/abs/2005.03140
    abstract: In order to clarify the properties of the secondary clump star HD 226808 (KIC 5307747), we combined four years
      of data from Kepler space photometry with high-resolution spectroscopy of the High Efficiency and Resolution Mercator
      Échelle Spectrograph mounted on the Mercator telescope. The fundamental atmospheric parameters, radial velocities, rotation
      velocities, and elemental abundance for Fe and Li were determined by analyzing line strengths and fitting-line profiles,
      based on a 1D local thermodynamic equilibrium model atmosphere. Second, we analyzed a photometric light curve obtained
      by Kepler and we extracted asteroseismic data of this target using Lets Analysis, Use and Report of Asteroseismology,
      a new seismic tool developed for the study of evolved FGK solar-like stars. We determined the evolutionary status and
      effective temperature, surface gravity, metallicity, microturbulence, and chemical abundances for Li, Ti, Fe, and Ni
      for HD 226808, by employing spectroscopy, asteroseismic scaling relations, and evolutionary structure models built in
      order to match observed data. Our results also show that an accurate synergy between good spectroscopic analysis and
      asteroseismology can provide a jump toward understanding evolved stars.
