    rank: 1
    ads: https://ui.adsabs.harvard.edu/abs/2022PLoSO..1764293D
    bibcode: 2022PLoSO..1764293D
    doi: https://doi.org/10.1371/journal.pone.0264293
    arxiv: ''
    abstract: The COVID-19 pandemic was severely aggravated in Brazil due to its politicization by the country's federal government.
      However, the impact of diffuse political forces on the fatality of an epidemic is notoriously difficult to quantify.
      Here we introduce a method to measure this effect in the Brazilian case, based on the inhomogeneous distribution throughout
      the national territory of political support for the federal government. This political support is quantified by the
      voting rates in the last general election in Brazil. This data is correlated with the fatality rates by COVID-19 in
      each Brazilian state as the number of deaths grows over time. We show that the correlation between fatality rate and
      political support grows as the government's misinformation campaign is developed. This led to the dominance of such
      political factor for the pandemic impact in Brazil in 2021. Once this dominance is established, this correlation allows
      for an estimation of the total number of deaths due to political influence as 35070 thousand up to the end of 2021,
      corresponding to (5711)% of the total number of deaths.
