    abstract: The instrument Simultaneous Polarimeter and Rapid Camera in Four Bands (SPARC4) is being commissioned in the
      1.6 m telescope of the Pico dos Dias Observatory (OPD). It is the result of a partnership between Instituto Nacional
      de Pesquisas Espaciais (INPE) and Laboratório Nacional de Astrofísica (LNA). In this work, we present the photometric
      characterization of SPARC4, such as its field distortions and signal-to-noise ratio. We will also discuss the photometric
      calibration procedure done through astronomical catalogs (e.g. Gaia DR3). Finally, we discuss the quality and consistency
      of the transformations of the natural system to the Sloan Sky Digital Survey (SDSS) griz standard system, given that
      the SPARC4 bands were designed to be similar to those of SDSS.
