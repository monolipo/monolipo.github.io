    arxiv: ''
    abstract: First detected on 2023 November 4 by the Gravitational-wave Optical Transient Observer, SN 2023wrk is a Type
      Ia Supernova at 40 Mpc, with significant unburned carbon in the outer ejecta. In this note, we present photometric and
      spectroscopic observations and analysis conducted by the Global Rapid Advanced Network Devoted to the Multi-messenger
      Addict over a 115 days period, which includes 78 days of measurements. The observations were contributed by both amateur
      and professional astronomers. J. Liu et al. analyzed the physical processes involved, and compared the evolution of
      color and spectral lines. We conclude that SN 2023wrk is the second 1999aa-like object with strong carbon absorption
      lines that has ever been found, which enriches our understanding of the subclass of 1999aa-like SNe.
