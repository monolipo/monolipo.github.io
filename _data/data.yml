  - title: Rotation of Solar Analogs Crossmatching Kepler and Gaia DR2
    link: https://ui.adsabs.harvard.edu/abs/2020ApJ...898..173D
    authors: Nascimento Jr., J.-D.; Almeida, L. de; Velloso, E. N.; Anthony, F.; Barnes, S. A.; Saar, S. H.; Meibom, S.; Costa,
      J. S.; Castro, M.; Galarza, J. Y.; Lorenzo-Oliveira, D.; Beck, P. G.; Meléndez, J.
    more: ''
    journal: ApJ
