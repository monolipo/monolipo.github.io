    arxiv: https://arxiv.org/abs/2409.03704
    abstract: The sub-Jovian desert is a region in the mass-period and radius-period parameter space that typically encompasses
      short-period ranges between super-Earths and hot Jupiters, and exhibits an intrinsic dearth of planets. This scarcity
      is likely shaped by photoevaporation caused by the stellar irradiation received by giant planets that have migrated
      inward. We report the detection and characterization of TOI-3568 b, a transiting super-Neptune with a mass of 26.4 1.0
      M$_$, a radius of 5.30 0.27 R$_$, a bulk density of 0.98 0.15 g cm$^-3$, and an orbital period of 4.417965 (5) d situated
      in the vicinity of the sub-Jovian desert. This planet orbiting a K dwarf star with solar metallicity was identified
      photometrically by the Transiting Exoplanet Survey Satellite (TESS). It was characterized as a planet by our high-precision
      radial-velocity (RV) monitoring program using MAROON-X at Gemini North, supplemented with additional observations from
      the SPICE large program with SPIRou at CFHT. We performed a Bayesian MCMC joint analysis of the TESS and ground-based
      photometry, and MAROON-X and SPIRou RVs, to measure the orbit, radius, and mass of the planet, as well as a detailed
      analysis of the high-resolution flux and polarimetric spectra to determine the physical parameters and elemental abundances
      of the host star. Our results reveal TOI-3568 b to be a hot super-Neptune rich in hydrogen and helium, with a core of
      heavier elements of between 10 and 25 M$_$ in mass. We analyzed the photoevaporation status of TOI-3568 b and find that
      it experiences one of the highest extreme-ultraviolet (EUV) luminosities among planets with a mass of M$_p$ < 2 M$_Nep$,
      yet it has an evaporation lifetime exceeding 5 Gyr. Positioned in the transition between two significant populations
      of exoplanets on the mass-period and energy diagrams, this planet presents an opportunity to test theories concerning
      the origin of the sub-Jovian desert.
