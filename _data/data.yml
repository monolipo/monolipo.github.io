  - title: Quantifying political influence on COVID-19 fatality in Brazil
    link: https://ui.adsabs.harvard.edu/abs/2022PLoSO..1764293D
    authors: de Almeida, L.; Carelli, P. V.; Cavalcanti, N. G.; do Nascimento, J.-D.; Felinto, D.
