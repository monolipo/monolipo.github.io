    abstract: We report discovering an exoplanet from following up a microlensing event alerted by Gaia. The event Gaia22dkv
      is toward a disk source rather than the traditional bulge microlensing fields. Our primary analysis yields a Jovian
      planet with at a projected orbital separation au, and the host is a 1.1 M $_☉$ turnoff star at 1.3 kpc. At , the host
      is far brighter than any previously discovered microlensing planet host, opening up the opportunity to test the microlensing
      model with radial velocity (RV) observations. RV data can be used to measure the planet's orbital period and eccentricity,
      and they also enable searching for inner planets of the microlensing cold Jupiter, as expected from the ``inner─outer
      correlation'' inferred from Kepler and RV discoveries. Furthermore, we show that Gaia astrometric microlensing will
      not only allow precise measurements of its angular Einstein radius $_E$ but also directly measure the microlens parallax
      vector and unambiguously break a geometric light-curve degeneracy, leading to the definitive characterization of the
      lens system.
