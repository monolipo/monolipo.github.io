    abstract: 'We introduce the SPARC4 Pipeline, an automated data reduction software package designed to process photometric
      and polarimetric data in four photometric bands (g, r, i, z), obtained with the new instrument SPARC4 installed on the
      1.6 m telescope at the Pico dos Dias Observatory. The software is open source, written in Python, based on the ASTROPOP
      package and other widely used astronomical packages. We present the main strategies and techniques used for calibrating
      the images and obtaining aperture photometry and dual-beam polarimetry of point-like sources. Science-grade reduction
      products for observations obtained during commissioning and science verification runs are presented, covering a broad
      range of scientific applications. Specifically, we present the following results: astrometric and photometric calibration
      of a crowded field; high-precision, high-cadence photometric and polarimetric time series for a delta-Scuti variable
      star and a transit of the exoplanet WASP-78 b; polarimetric results from a standard star in the Flame Nebula; and a
      deep image of an extended object -- the spiral galaxy pair NGC-4045.'
    keywords: SPARC4, Data reduction software, Photometry, Polarimetry
