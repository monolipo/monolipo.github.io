    arxiv: https://arxiv.org/abs/2603.09045
    doi: https://doi.org/10.48550/arXiv.2603.09045
    abstract: We present observations and analysis of two low planet/host mass-ratio ($q$) microlensing planets discovered
      in high-magnification events. KMT-2025-BLG-0811Lb has $q 4.5 10^-5$, and a Bayesian analysis favors a super-Earth/mini-Neptune
      orbiting an M- or K-dwarf host at a projected separation of $ 3$ au. KMT-2025-BLG-0912Lb has $q = 2.6 10^-4$ and likely
      hosts a super-Earth/mini-Neptune around either a low-mass M dwarf or a brown dwarf at $ 1$ au. Even with an observing
      cadence of $Γ> 30 hr^-1$ during the planetary signal, KMT-2025-BLG-0811 still exhibits the ``central-resonant'' degeneracy.
      Reviewing nine such events, we find that the ``central-resonant'' degeneracy can be divided into two distinct types
      that occupy separate regions in the plane of $q$ and normalized source radius ($ρ$). Type~I events have similar $q$
      but substantially different $ρ$ and are more difficult to resolve from the light curves. For Type~II events, the ``resonant''
      solutions have relatively lower $q$ and larger $ρ$. Our review provides guidance for searching for the alternative solution
      once one solution has been identified.
