  - title: A Hale-like Cycle in the Solar Twin 18 Scorpii
    link: https://ui.adsabs.harvard.edu/abs/2023ApJ...958...57D
    authors: do Nascimento, J.-D.; Barnes, S. A.; Saar, S. H.; de Mello, G. F. Porto; Hall, J. C.; Anthony, F.; de Almeida,
      L.; Velloso, E. N.; da Costa, J. S.; Petit, P.; Strugarek, A.; et al.
    more: ''
    journal: ApJ
