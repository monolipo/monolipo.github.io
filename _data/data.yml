    abstract: Based on the coordinates of the field center (RA=10:25:19.48, DEC=-27:41:54.00), we obtained 12 frames of 300
      seconds each using the 0.6m telescope of OPD, starting on 2025-02-16 at 02:30:42.23 and ending at 07:43:29.39 UTC. The
      FOV of the stacked image is 10.5x10.5 arcmin with a pixel scale of 0.614 arcsec/pixel. We did not detect any candidate
      in our stacked images with an upper limit of I > 21.34 mag at 5-sigma, calibrated against several stars of the I/339
      catalog (HSOY, Altmann et al, 2017). Our non-detection upper limit is similar to the results of Ducoin et al. (GCN 39344)
      with nothing brighter than 22.7 mag detected in r. Our results are also in slight discrepancy with the findings of Malesani
