  - title: 'Li-rich giant stars under scrutiny: Binarity, magnetic activity and the evolutionary status after Gaia DR2'
    link: https://ui.adsabs.harvard.edu/abs/2020MNRAS.498.2295G
    authors: Gonçalves, B. F. O.; da Costa, J. S.; de Almeida, L.; Castro, M.; do Nascimento, J.-D.
    more: ''
    journal: MNRAS
    volume: '1'
    page: '1'
    year: 2020
    show-home: false
