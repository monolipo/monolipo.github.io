    doi: https://doi.org/10.1051/0004-6361/201937219
    arxiv: https://arxiv.org/abs/2005.05223
    abstract: 'Context. One of the most enigmatic phenomena related to solar activity is the so-called Maunder minimum phase.
      It consists in the lowest sunspot count ever registered for the Sun and has not been confirmed for other stars to date.
      Since the spectroscopic observations of stellar activity at the Mount Wilson Observatory, the solar analog HD 43587
      has shown a very low and apparently invariant activity level, which makes it a Maunder minimum candidate. Aims: We aim
      to analyze the chromospheric activity evolution of HD 43587 and its evolutive status, with the intention of unraveling
      the reasons for this low and flat activity. Methods: We used an activity measurements dataset available in the literature,
      and computed the S-index from HARPS and NARVAL spectra to infer a cycle period. Additionally, we analyzed the CoRoT
      light curve of HD 43587, and applied gyrochronology and activity calibrations to determine its rotation period. Finally,
      based on an evolutionary model and the inferred rotation period, we used the EULAG-MHD code to perform global MHD simulations
      of HD 43587 to get some insight into its dynamo process. Results: We confirm the almost flat activity profile, with
      a cycle period P$_cyc$ = 10.44 3.03 yr deduced from the S-index time series, and a long-term trend that might be a period
      of more than 50 yr. It was impossible to define a rotation period from the light curve, however gyrochronology and activity
      calibrations allow us to infer an indirect estimate of $^̄$P$_rot$ = 22.6 1.9 d. Furthermore, the MHD simulations confirm
      an oscillatory dynamo with a cycle period in good agreement with the observations and a low level of surface magnetic
      activity. Conclusions: We conclude that this object might be experiencing a ``natural'''' decrease in magnetic activity
      as a consequence of its age. Nevertheless, the possibility that HD 43587 is in a Maunder minimum phase cannot be ruled
      out.'
    keywords: 'stars: activity, dynamo, stars: chromospheres, stars: rotation, stars: solar-type, stars: magnetic field, Astrophysics
