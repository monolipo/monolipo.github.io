    ads: https://ui.adsabs.harvard.edu/abs/2018AJ....156..172D
    bibcode: 2018AJ....156..172D
    doi: https://doi.org/10.3847/1538-3881/aadc68
    arxiv: https://arxiv.org/abs/1809.10230
    abstract: We propose a new parameterization of the impact parameter u $_0$ and impact angle for microlensing systems composed
      by an Earth-like exoplanet around a solar-mass star at 1 au. We present the caustic topology of such system, as well
      as the related light curves generated by using such a new parameterization. Based on the same density of points and
      accuracy of regular methods, we obtain results five times faster for discovering Earth-like exoplanets. In this big
      data revolution of photometric astronomy, our method will impact future missions like WFIRST (NASA) and Euclid (ESA)
      and their data pipelines, providing a rapid and deep detection of exoplanets for this specific class of microlensing
      event that might otherwise be lost.
    keywords: 'gravitational lensing: micro, planetary systems, planets and satellites: detection, Astrophysics - Earth and
      Planetary Astrophysics, Astrophysics - Solar and Stellar Astrophysics'
