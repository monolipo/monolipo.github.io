  page_title: Thesis and Books
  page_title_ptbr: Teses e Livros
  intro: Selected theses, dissertation, and book chapter. Use the +info button to expand additional details for each item.
  intro_ptbr: Teses, dissertação e capítulo de livro selecionados. Use o botão +info para expandir detalhes adicionais de
    cada item.
  map_button: World map view
  map_button_ptbr: Visualização no mapa mundial
  map_link: /thesis_map.html
  map_link_ptbr: /thesis_map_ptbr.html
  sections:
  - key: phd
    label: Ph.D. Thesis
    label_ptbr: Tese de Doutorado
    entries:
    - title: Application of the gravitational microlensing technique in the search for low-mass exoplanets
      title_ptbr: Aplicação da técnica de microlentes gravitacionais na busca de exoplanetas de baixa massa
      authors: Leandro de Almeida
      year: 2021
      type: Doctoral thesis
      type_ptbr: Tese de doutorado
      institution: Universidade Federal do Rio Grande do Norte (UFRN)
      program: Graduate Program in Physics
      program_ptbr: Programa de Pós-Graduação em Física
      advisor: José Dias do Nascimento Júnior
      coadvisor: ''
      pages: 113f
      defense_date: '2021-03-18'
      repository_link: https://repositorio.ufrn.br/items/aad32c68-5bdf-4599-8f2e-51e4b0d657e0
      handle_link: https://repositorio.ufrn.br/handle/123456789/33222
      pdf_link: https://repositorio.ufrn.br/bitstream/123456789/33222/1/Aplicacaotecnicamicrolentes_Almeida_2021.pdf
      keywords: Exoplanets; Gravitational microlensing; General relativity; Photometry; Detection
      keywords_ptbr: Exoplanetas; Microlentes gravitacionais; Relatividade geral; Fotometria; Detecção
      abstract: Gravitational lenses were proposed by Albert Einstein in the course of developing the theory of general relativity.
        This thesis focuses on gravitational microlensing events and their application to the detection of low-mass exoplanets.
        It discusses the topology of planetary caustics, photometric observations of microlensing events monitored at Pico
        dos Dias Observatory, and a parameterization of source trajectories designed to increase the probability of detecting
        Earth-mass planets. The thesis also reports the analysis of candidate exoplanet detections, including one using data
        observed at OPD during the doctoral work.
      abstract_ptbr: As lentes gravitacionais foram propostas por Albert Einstein no percurso da elaboração da teoria da relatividade
        geral. Esta tese é focada em eventos de microlentes gravitacionais e em sua aplicação na detecção de exoplanetas de
        baixa massa. O trabalho discute a topologia de cáusticas planetárias, observações fotométricas de eventos acompanhados
        no Observatório do Pico dos Dias, e uma parametrização de trajetórias da fonte para aumentar a probabilidade de detecção
        de planetas com massa similar à da Terra. A tese também apresenta a análise de candidatos a exoplanetas, incluindo
        um caso com dados observados no OPD durante o doutorado.
  - key: msc
    label: MSc Dissertation
    label_ptbr: Dissertação de Mestrado
    entries:
    - title: Study of gravitational microlensing topology and the discovery of Earth-like exoplanets in the habitable zone
      title_ptbr: Estudo da topologia de microlentes gravitacionais e a descoberta de exoplanetas do tipo Terra na zona habitável
      authors: Leandro de Almeida
      year: 2017
      type: MSc dissertation
      type_ptbr: Dissertação de mestrado
      institution: Universidade Federal do Rio Grande do Norte (UFRN)
      program: Graduate Program in Physics
      program_ptbr: Programa de Pós-Graduação em Física
      advisor: José Dias do Nascimento Júnior
      coadvisor: João Rodrigo Souza Leão
      pages: 101f
      defense_date: '2017-02-10'
      repository_link: https://repositorio.ufrn.br/items/2a4fb102-7680-41ec-a379-dc40b16d1bb6
      handle_link: https://repositorio.ufrn.br/jspui/handle/123456789/23146
      pdf_link: https://repositorio.ufrn.br/bitstream/123456789/23146/1/LeandroDeAlmeida_DISSERT.pdf
      keywords: Gravitational microlensing; Exoplanets; Detection
      keywords_ptbr: Microlentes gravitacionais; Exoplanetas; Detecção
      abstract: 'This MSc dissertation presents the equations behind gravitational microlensing theory and their application
        to the detection of distant, low-mass planets. It focuses on systems with close topology, planetary mass ratios comparable
        to Earth-like planets around solar-type stars, and source trajectory parameterizations designed to reduce the search
        time in simulated light curves. The work also describes two algorithms used to simulate the topology and light curves
        of microlensing events: a semi-analytical lens-equation method and an Inverse Ray Shooting method.'
      abstract_ptbr: Na última década, o número de exoplanetas descobertos cresceu exponencialmente, principalmente devido
        às observações realizadas pela missão Kepler e pela missão K2. A maior parte dessas descobertas foi feita pelo método
        de trânsito planetário, que possui baixa sensibilidade para planetas de baixa massa distantes de suas estrelas. Em
        contrapartida, a técnica de microlentes gravitacionais é sensível a planetas de baixa massa em órbitas mais afastadas.
        Nesta dissertação são apresentadas as equações da teoria de microlentes gravitacionais e suas aplicações na detecção
        de planetas distantes de baixa massa, com foco na caracterização de sistemas com topologia fechada e massas planetárias
        comparáveis à Terra. O trabalho também propõe uma parametrização para reduzir o tempo de busca em curvas de luz geradas
        por sistemas com topologia close e descreve algoritmos de simulação por método semi-analítico e Inverse Ray Shooting.
  - key: books
    label: Books
    label_ptbr: Livros
    entries:
    - title: 'Unraveling Astrophotography: Physical Principles and Techniques for Processing Astronomical Images from CCD
        and DSLR'
      title_ptbr: 'Desvendando a Astrofotografia: Princípios Físicos e Técnicas para Processamento de Imagens Astronômicas
        de CCD e DSLR'
      authors: Leandro de Almeida; João Rodrigo de Souza Leão
      year: 2023
      type: Book chapter
      type_ptbr: Capítulo de livro
      book: 'Fundamentos das ciências exatas: da matemática à física e além'
      edition: 1st ed.
      publisher: Atena Editora
      pages: 31-36
      doi: 10.22533/at.ed.2792329113
      doi_link: https://doi.org/10.22533/at.ed.2792329113
      chapter_link: https://atenaeditora.com.br/catalogo/post/desvendando-a-astrofotografia-principios-fisicos-e-tecnicas-para-processamento-de-imagens-astronomicas-de-ccd-e-dslr
      book_link: https://atenaeditora.com.br/catalogo/ebook/fundamentos-das-ciencias-exatas-da-matematica-a-fisica-e-alem
      keywords: Astrophotography; Telescope; CCD; DSLR; Astronomy
      keywords_ptbr: Astrofotografia; Telescópio; CCD; DSLR; Astronomia
      abstract: This work outlines the methodology used in telescope and astrophotography workshops. The mini-course trains
        participants to operate motorized telescopes, perform basic maintenance and optical collimation, and understand current
        image-processing techniques used in astrophotography. The chapter covers topics ranging from telescope optics to the
        final processing steps for astronomical images.
      abstract_ptbr: Este trabalho apresenta a metodologia utilizada em oficinas de telescópios e astrofotografia. O minicurso
        capacita participantes a realizar operações básicas em telescópios motorizados, manutenção e colimação da óptica,
        além de fornecer conhecimentos básicos das principais técnicas atuais de processamento em astrofotografia. O capítulo
        cobre tópicos que vão dos fundamentos de óptica de telescópios ao processamento final de imagens astronômicas.
