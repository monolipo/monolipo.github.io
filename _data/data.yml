    ads: https://ui.adsabs.harvard.edu/abs/2020ApJ...898..173D
    bibcode: 2020ApJ...898..173D
    doi: https://doi.org/10.3847/1538-4357/ab9c16
    arxiv: https://arxiv.org/abs/2006.06204
    abstract: A major obstacle to interpreting the rotation period distribution for main-sequence stars from Kepler mission
      data has been the lack of a precise evolutionary status for these objects. We address this by investigating the evolutionary
      status based on Gaia Data Release 2 parallaxes and photometry for more than 30,000 Kepler stars with rotation period
      measurements. Many of these are subgiants and should be excluded in future work on dwarfs. We particularly investigate
      a 193-star sample of solar analogs and report newly determined rotation periods for 125 of these. These include 54 stars
      from a prior sample, of which we can confirm the periods for 50. The remainder are new, and 10 of them longer than a
      solar rotation period, suggesting that Sun-like stars continue to spin down on the main sequence past solar age. Our
      sample of solar analogs could potentially serve as a benchmark for future missions, such as PLAnetary Transits and Oscillations
      of stars, and emphasizes the need for additional astrometric, photometric, and spectroscopic information before interpreting
      the stellar populations and results from time series surveys.
    keywords: Fundamental parameters of stars, Stellar rotation, Stellar activity, Stellar photometry, Stellar evolution,
