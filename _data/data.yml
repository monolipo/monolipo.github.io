  - title: Starspot Temperature of CoRoT-2 from Multiwavelength Observations with SPARC4
    link: https://ui.adsabs.harvard.edu/abs/2025ApJ...992..174V
    authors: Valio, A.; Martioli, E.; Kovács, A. O.; Sumida, V. Y. D.; de Almeida, L.; Lorenzo-Oliveira, D.; Jablonski, F.;
      Rodrigues, C. V.
    more: ''
    journal: ApJ
    volume: '992'
    page: '174'
    year: 2025
    show-home: false
