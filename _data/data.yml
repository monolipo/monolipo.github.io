  - title: 'TOI-257b (HD 19916b): A Warm sub-Saturn Orbiting an Evolved F-type Star'
    link: https://ui.adsabs.harvard.edu/abs/2021MNRAS.502.3704A
    authors: Addison, B. C.; Wright, D. J.; Nicholson, B. A.; Cale, B.; Mocnik, T.; Huber, D.; Plavchan, P.; Wittenmyer, R.
