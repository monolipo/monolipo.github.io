  - title: A sub-Neptune planet around TOI-1695 discovered and characterized with SPIRou and TESS
    link: https://ui.adsabs.harvard.edu/abs/2023A&A...670A.136K
    authors: Kiefer, F.; Hébrard, G.; Martioli, E.; Artigau, É.; Doyon, R.; Donati, J.-F.; Cadieux, C.; Carmona, A.; Ciardi,
      D. R.; Cristofari, P. I.; de Almeida, L.; et al.
    more: ''
