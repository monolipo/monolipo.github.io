career-profile:
  title: Career Profile
  summary: I am a Researcher at the Astrophysics Division of the Instituto Nacional de Pesquisas Espaciais (INPE), where I
    am also a faculty member of the graduate program in Astrophysics. My work focuses on exoplanets, gravitational microlensing,
    stellar astrophysics, astronomical instrumentation, and time-domain observations. I hold a PhD in Physics from the Universidade
    Federal do Rio Grande do Norte (UFRN), where I worked on gravitational-microlensing equations and their application to
    the search for low-mass exoplanets. I have extensive observational experience at the Observatório do Pico dos Dias, with
    more than 350 observing nights using imaging cameras and spectrographs, and I have contributed to observing proposals
    with Gemini North and SOAR. I have also worked as a resident astronomer at the SOAR telescope and participated in the
    commissioning of the SPARC4 instrument. Since 2022, I have contributed to GRANDMA as an observer and data analyst, and
    I am a member of the PLATO consortium in the stellar-science area.
  summary-more: ''
career-profile_ptbr:
  title: Perfil de Carreira
  summary: Sou Pesquisador da Divisão de Astrofísica do Instituto Nacional de Pesquisas Espaciais (INPE), onde também sou
    membro do corpo docente da pós-graduação em Astrofísica. Minha atuação se concentra em exoplanetas, microlentes gravitacionais,
    astrofísica estelar, instrumentação astronômica e observações no domínio temporal. <br><br>Doutor em Física pela Universidade
    Federal do Rio Grande do Norte (UFRN), onde trabalhei com a parametrização das equações de microlentes gravitacionais
    e sua aplicação na busca por exoplanetas de baixa massa. Tenho ampla experiência observacional no Observatório do Pico
    dos Dias, com mais de 350 noites de observação usando câmeras diretas e espectrógrafos, e participei de propostas observacionais
    com o Gemini Norte e o SOAR. Também atuei como astrônomo residente do telescópio SOAR e participei do comissionamento
    do instrumento SPARC4. Desde 2022, participo da colaboração GRANDMA como observador e na redução/análise de dados, além
    de integrar o consórcio PLATO na área estelar.
  summary-more: ''
