    abstract: This study investigates the polarization of Novae stars, focusing on the targets V1723 Sco and V572 Vel. Observations
      were conducted at the Observatório do Pico dos Dias using IAGPOL and SPARC4 polarimetric instruments. The main objective
      is to evaluate whether these Novae exhibit intrinsic polarization rather than polarization originating from the interstellar
      medium. Polarimetric measurements often reflect a combination of signals from both the source and the interstellar medium.
      Therefore, a crucial step in the analysis is to disentangle these contributions in order to confirm whether the observed
      polarization truly originates from the Nova itself. Such polarization can provide insights into the system, for example
      by revealing asymmetries in the geometry of the ejected material or by indicating whether the scattering within the
      ejecta is caused by dust or by electrons, as suggested by the spectral dependence of the polarization.
