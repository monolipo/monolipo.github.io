    doi: https://doi.org/10.5281/zenodo.5560822
    abstract: We performed a validation exercise to recover the rotational modulation for 1,000 simulated PLATO light curves.
      We created a powerful simulation tool built upon the PLATO Solar-like Light-curve Simulator combining astrophysical
      (starspot rotation and evolution, planetary transits, oscillations, and granulations) and systematic instrumental effects.
      The simulated light curves follow specifications from the PLATO telescope in order to closely reproduce the expected
      raw data. We present a method of stitching and detrending to recover the original signal while also separating the rotational
      signal from the transit/eclipsing one. We find that a precise determination of rotation periods using this pre-processing
      pipeline is possible at every level of activity. From the stars with clear rotation determination, 92% of the values
      we recover are within the 10% confidence interval of the inputs.
